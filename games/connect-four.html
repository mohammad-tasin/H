<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Four</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div class="panel">
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="../help/connect-four-help.html">? Help</a>
  </div>
  <h1>🔴 Connect Four</h1>
  <p>You are 🔴 — drop discs and connect 4 before the 🟡 CPU!</p>

  <div id="controls" style="display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap"></div>
  <div id="board" class="board-4"></div>

  <div style="display:flex;gap:.75rem;align-items:center;margin-top:1rem;flex-wrap:wrap">
    <button id="new">↺ New Game</button>
  </div>

  <p id="status" class="note">Your turn.</p>
</div>

<script>
const R=6, C=7;
let b, over=false;

function init() {
  b = Array.from({length:R}, () => Array(C).fill(0));
  over = false;
  render();
  document.getElementById('status').textContent = 'Your turn.';
  document.getElementById('status').className = 'note';
}

function drop(col, p) {
  for (let r=R-1; r>=0; r--) if (!b[r][col]) { b[r][col]=p; return r; }
  return -1;
}

function win(p) {
  for (let r=0; r<R; r++) for (let c=0; c<C; c++) {
    if (c+3<C  && [0,1,2,3].every(i=>b[r][c+i]===p)) return true;
    if (r+3<R  && [0,1,2,3].every(i=>b[r+i][c]===p)) return true;
    if (r+3<R&&c+3<C && [0,1,2,3].every(i=>b[r+i][c+i]===p)) return true;
    if (r-3>=0&&c+3<C && [0,1,2,3].every(i=>b[r-i][c+i]===p)) return true;
  }
  return false;
}

function full() { return b[0].every(Boolean); }

function cpu() {
  const opts = [...Array(C).keys()].filter(c=>b[0][c]===0);
  if (!opts.length) return;
  drop(opts[Math.floor(Math.random()*opts.length)], 2);
}

function move(c) {
  if (over || drop(c,1)<0) return;
  if (win(1)) { over=true; document.getElementById('status').textContent='🎉 You win!'; document.getElementById('status').className='note win'; render(); return; }
  if (full()) { over=true; document.getElementById('status').textContent='🤝 Draw!'; render(); return; }
  cpu();
  if (win(2)) { over=true; document.getElementById('status').textContent='🤖 CPU wins.'; document.getElementById('status').className='note lose'; }
  else if (full()) { over=true; document.getElementById('status').textContent='🤝 Draw!'; }
  else document.getElementById('status').textContent='Your turn.';
  render();
}

function render() {
  const ctrl = document.getElementById('controls');
  ctrl.innerHTML = '';
  for (let c=0; c<C; c++) {
    const bt = document.createElement('button');
    bt.textContent = '↓';
    bt.style.width = '50px';
    bt.style.padding = '0.3rem 0';
    bt.onclick = () => move(c);
    ctrl.appendChild(bt);
  }
  const bd = document.getElementById('board');
  bd.innerHTML = '';
  for (let r=0; r<R; r++) for (let c=0; c<C; c++) {
    const d = document.createElement('div');
    d.className = 'cell';
    if (b[r][c]===1) d.style.background = '#ef4444';
    else if (b[r][c]===2) d.style.background = '#eab308';
    bd.appendChild(d);
  }
}

document.getElementById('new').onclick = init;
init();
</script>
</body>
</html>
