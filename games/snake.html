<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Snake</title><link rel="stylesheet" href="../styles.css"></head>
<body><div class="panel"><div class="nav"><a href="../index.html">Home</a><a href="../help/snake-help.html">Help</a></div><h1>Snake</h1><canvas id="cv" width="400" height="400" style="background:#0f172a;border-radius:8px"></canvas><p class="note">Use Arrow keys. <button id="restart">Restart</button></p><p id="score" class="note">Score: 0</p></div>
<script>
const cv=document.getElementById('cv'),x=cv.getContext('2d'),n=20,s=20; let snake,dir,food,timer,over;
function place(){ while(true){ const f={x:Math.floor(Math.random()*n),y:Math.floor(Math.random()*n)}; if(!snake.some(p=>p.x===f.x&&p.y===f.y)) return f; }}
function init(){ snake=[{x:10,y:10}]; dir={x:1,y:0}; food=place(); over=false; document.getElementById('score').textContent='Score: 0'; clearInterval(timer); timer=setInterval(step,120); draw(); }
function step(){ if(over) return; const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y}; if(h.x<0||h.y<0||h.x>=n||h.y>=n||snake.some(p=>p.x===h.x&&p.y===h.y)){ over=true; return; } snake.unshift(h); if(h.x===food.x&&h.y===food.y){ food=place(); } else snake.pop(); document.getElementById('score').textContent='Score: '+(snake.length-1); draw(); }
function draw(){ x.clearRect(0,0,400,400); x.fillStyle='#22c55e'; snake.forEach(p=>x.fillRect(p.x*s,p.y*s,s-2,s-2)); x.fillStyle='#ef4444'; x.fillRect(food.x*s,food.y*s,s-2,s-2); if(over){ x.fillStyle='#fff'; x.font='28px Arial'; x.fillText('Game Over',130,200);} }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowUp'&&dir.y!==1)dir={x:0,y:-1}; if(e.key==='ArrowDown'&&dir.y!==-1)dir={x:0,y:1}; if(e.key==='ArrowLeft'&&dir.x!==1)dir={x:-1,y:0}; if(e.key==='ArrowRight'&&dir.x!==-1)dir={x:1,y:0}; });
document.getElementById('restart').onclick=init; init();
</script></body></html>
