<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div class="panel">
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="../help/snake-help.html">? Help</a>
  </div>
  <h1>🐍 Snake</h1>
  <p>Eat the 🍎 food to grow — avoid walls and your own tail!</p>

  <div class="score-bar" style="margin-bottom:.75rem">
    <div class="score-item">
      <span>Score</span>
      <span id="score">0</span>
    </div>
    <div class="score-item">
      <span>Best</span>
      <span id="best">0</span>
    </div>
  </div>

  <canvas id="cv" width="400" height="400" style="background:#0a0a1a;border-radius:12px;border:1px solid rgba(255,255,255,.1);display:block"></canvas>

  <div style="display:flex;gap:.75rem;align-items:center;margin-top:.85rem;flex-wrap:wrap">
    <button id="restart">↺ Restart</button>
    <span style="font-size:.85rem;color:#64748b">Use ← → ↑ ↓ arrow keys</span>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const x  = cv.getContext('2d');
const n = 20, s = 20;
let snake, dir, food, timer, over, best = 0;

function place() {
  while (true) {
    const f = { x: Math.floor(Math.random()*n), y: Math.floor(Math.random()*n) };
    if (!snake.some(p => p.x===f.x && p.y===f.y)) return f;
  }
}

function init() {
  snake = [{x:10, y:10}];
  dir   = {x:1, y:0};
  food  = place();
  over  = false;
  document.getElementById('score').textContent = 0;
  clearInterval(timer);
  timer = setInterval(step, 110);
  draw();
}

function step() {
  if (over) return;
  const h = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (h.x<0 || h.y<0 || h.x>=n || h.y>=n || snake.some(p=>p.x===h.x&&p.y===h.y)) {
    over = true;
    const sc = snake.length - 1;
    if (sc > best) { best = sc; document.getElementById('best').textContent = best; }
    draw(); return;
  }
  snake.unshift(h);
  if (h.x===food.x && h.y===food.y) { food = place(); }
  else snake.pop();
  document.getElementById('score').textContent = snake.length - 1;
  draw();
}

function draw() {
  x.clearRect(0, 0, 400, 400);
  // grid dots
  x.fillStyle = 'rgba(255,255,255,.04)';
  for (let i=0; i<n; i++) for (let j=0; j<n; j++) x.fillRect(i*s+9, j*s+9, 2, 2);
  // food
  x.font = (s-2)+'px serif';
  x.fillText('🍎', food.x*s, food.y*s+s-2);
  // snake
  snake.forEach((p, idx) => {
    const t = 1 - idx/snake.length;
    x.fillStyle = `hsl(${140+idx*2},80%,${40+t*20}%)`;
    const r = idx===0 ? s-1 : s-3;
    const off = idx===0 ? 0 : 1;
    x.beginPath();
    x.roundRect(p.x*s+off, p.y*s+off, r, r, [idx===0?4:3]);
    x.fill();
  });
  if (over) {
    x.fillStyle = 'rgba(0,0,0,.6)';
    x.fillRect(0, 0, 400, 400);
    x.fillStyle = '#f1f5f9';
    x.font = 'bold 28px system-ui';
    x.textAlign = 'center';
    x.fillText('Game Over', 200, 185);
    x.font = '18px system-ui';
    x.fillStyle = '#94a3b8';
    x.fillText('Score: ' + (snake.length-1) + '  —  Press Restart', 200, 220);
    x.textAlign = 'left';
  }
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'    && dir.y!==1)  dir={x:0,  y:-1};
  if (e.key==='ArrowDown'  && dir.y!==-1) dir={x:0,  y:1};
  if (e.key==='ArrowLeft'  && dir.x!==1)  dir={x:-1, y:0};
  if (e.key==='ArrowRight' && dir.x!==-1) dir={x:1,  y:0};
});
document.getElementById('restart').onclick = init;
init();
</script>
</body>
</html>
