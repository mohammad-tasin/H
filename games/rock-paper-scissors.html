<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div class="panel">
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="../help/rock-paper-scissors-help.html">? Help</a>
  </div>
  <h1>✂️ Rock Paper Scissors</h1>
  <p>Pick your move — the computer picks at the same time!</p>

  <div class="rps-buttons">
    <button class="rps-btn" data-c="rock" title="Rock">🪨</button>
    <button class="rps-btn" data-c="paper" title="Paper">📄</button>
    <button class="rps-btn" data-c="scissors" title="Scissors">✂️</button>
  </div>

  <div id="result-area" style="min-height:3.5rem">
    <p id="round" class="note" style="font-size:1.05rem"></p>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <span>You</span>
      <span id="sy">0</span>
    </div>
    <div class="score-item">
      <span>CPU</span>
      <span id="sc">0</span>
    </div>
    <div class="score-item">
      <span>Draws</span>
      <span id="sd">0</span>
    </div>
  </div>
</div>

<script>
const list = ['rock','paper','scissors'];
const emoji = { rock:'🪨', paper:'📄', scissors:'✂️' };
let y = 0, c = 0, d = 0;

function decide(a, b) {
  if (a === b) return 0;
  if ((a==='rock'&&b==='scissors')||(a==='paper'&&b==='rock')||(a==='scissors'&&b==='paper')) return 1;
  return -1;
}

document.querySelectorAll('.rps-btn').forEach(btn => btn.onclick = () => {
  const you = btn.dataset.c;
  const cpu = list[Math.floor(Math.random()*3)];
  const r   = decide(you, cpu);
  if (r > 0) y++; else if (r < 0) c++; else d++;
  document.getElementById('sy').textContent = y;
  document.getElementById('sc').textContent = c;
  document.getElementById('sd').textContent = d;
  const label = r > 0 ? '🎉 You win!' : r < 0 ? '🤖 CPU wins.' : '🤝 Draw!';
  document.getElementById('round').textContent =
    emoji[you] + ' You  vs  CPU ' + emoji[cpu] + '  →  ' + label;
});
</script>
</body>
</html>
