<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div class="panel">
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="../help/tic-tac-toe-help.html">? Help</a>
  </div>
  <h1>⭕ Tic-Tac-Toe</h1>
  <p>You are <strong style="color:#a78bfa">X</strong> — the computer is <strong style="color:#60a5fa">O</strong>. Get three in a row!</p>

  <div id="board" class="board-3"></div>

  <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem">
    <button id="reset">↺ New Game</button>
  </div>

  <p id="status" class="note">Your turn.</p>

  <div class="score-bar" style="margin-top:1rem">
    <div class="score-item">
      <span>You</span>
      <span id="sw">0</span>
    </div>
    <div class="score-item">
      <span>CPU</span>
      <span id="sc">0</span>
    </div>
    <div class="score-item">
      <span>Draws</span>
      <span id="sd">0</span>
    </div>
  </div>
</div>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
let b = Array(9).fill(''), over = false;
let sw = 0, sc = 0, sd = 0;
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function winner(p) { return wins.some(w => w.every(i => b[i] === p)); }

function draw() {
  boardEl.innerHTML = '';
  b.forEach((v, i) => {
    const bt = document.createElement('button');
    bt.textContent = v;
    bt.style.color = v === 'X' ? '#a78bfa' : '#60a5fa';
    bt.onclick = () => move(i);
    boardEl.appendChild(bt);
  });
}

function move(i) {
  if (over || b[i]) return;
  b[i] = 'X';
  step();
  if (over) return;
  const open = b.map((v,i) => v ? null : i).filter(v => v !== null);
  if (!open.length) { over = true; return; }
  b[open[Math.floor(Math.random()*open.length)]] = 'O';
  step();
}

function step() {
  draw();
  if (winner('X')) { statusEl.textContent = '🎉 You win!'; statusEl.className='note win'; sw++; document.getElementById('sw').textContent=sw; over = true; }
  else if (winner('O')) { statusEl.textContent = '🤖 Computer wins.'; statusEl.className='note lose'; sc++; document.getElementById('sc').textContent=sc; over = true; }
  else if (b.every(Boolean)) { statusEl.textContent = '🤝 Draw!'; statusEl.className='note'; sd++; document.getElementById('sd').textContent=sd; over = true; }
  else { statusEl.textContent = 'Your turn.'; statusEl.className='note'; }
}

document.getElementById('reset').onclick = () => {
  b = Array(9).fill(''); over = false; statusEl.textContent = 'Your turn.'; statusEl.className='note'; draw();
};

draw();
</script>
</body>
</html>
