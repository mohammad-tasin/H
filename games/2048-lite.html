<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 Lite</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div class="panel">
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="../help/2048-lite-help.html">? Help</a>
  </div>
  <h1>🔢 2048 Lite</h1>
  <p>Slide tiles with arrow keys and merge them to reach <strong style="color:#a78bfa">2048</strong>!</p>

  <div class="score-bar" style="margin-bottom:.75rem">
    <div class="score-item">
      <span>Score</span>
      <span id="score">0</span>
    </div>
    <div class="score-item">
      <span>Best</span>
      <span id="best">0</span>
    </div>
  </div>

  <div id="b" class="grid-2048"></div>

  <div style="margin-top:1rem;display:flex;gap:.75rem;align-items:center;flex-wrap:wrap">
    <button id="new">↺ New Game</button>
    <span style="font-size:.85rem;color:#64748b">Use ← → ↑ ↓ arrow keys</span>
  </div>

  <p id="status" class="note"></p>
</div>

<script>
const tileColors = {
  0:'rgba(255,255,255,.05)', 2:'#3b82f6', 4:'#8b5cf6', 8:'#f59e0b',
  16:'#ef4444', 32:'#ec4899', 64:'#22c55e', 128:'#f97316',
  256:'#14b8a6', 512:'#a855f7', 1024:'#06b6d4', 2048:'#fbbf24'
};
let g, score = 0, best = 0;

function blank() { return Array.from({length:4}, () => Array(4).fill(0)); }

function add() {
  const a = [];
  for (let r=0; r<4; r++) for (let c=0; c<4; c++) if (!g[r][c]) a.push([r,c]);
  if (!a.length) return;
  const [r,c] = a[Math.floor(Math.random()*a.length)];
  g[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  row = row.filter(Boolean);
  for (let i=0; i<row.length-1; i++) {
    if (row[i] === row[i+1]) { score += row[i]*2; row[i] *= 2; row[i+1] = 0; }
  }
  return row.filter(Boolean).concat(Array(4-row.filter(Boolean).length).fill(0));
}

function move(dir) {
  const before = JSON.stringify(g);
  if (dir === 'left')  g = g.map(slide);
  if (dir === 'right') g = g.map(r => slide([...r].reverse()).reverse());
  if (dir === 'up')   { let n=blank(); for(let c=0;c<4;c++){const col=slide([g[0][c],g[1][c],g[2][c],g[3][c]]); for(let r=0;r<4;r++) n[r][c]=col[r];} g=n; }
  if (dir === 'down') { let n=blank(); for(let c=0;c<4;c++){const col=slide([g[3][c],g[2][c],g[1][c],g[0][c]]).reverse(); for(let r=0;r<4;r++) n[r][c]=col[r];} g=n; }
  if (JSON.stringify(g) !== before) add();
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
  document.getElementById('score').textContent = score;
  draw();
}

function draw() {
  const b = document.getElementById('b');
  b.innerHTML = '';
  let max = 0;
  for (let r=0; r<4; r++) for (let c=0; c<4; c++) {
    const v = g[r][c];
    max = Math.max(max, v);
    const d = document.createElement('div');
    d.className = 'tile-2048';
    d.style.background = tileColors[v] || '#f97316';
    d.style.fontSize   = v >= 1000 ? '1rem' : v >= 100 ? '1.1rem' : '1.35rem';
    d.textContent = v || '';
    b.appendChild(d);
  }
  const st = document.getElementById('status');
  if (max >= 2048) { st.textContent = '🎉 You reached 2048!'; st.className = 'note win'; }
}

function init() { g = blank(); score = 0; document.getElementById('score').textContent = 0; add(); add(); draw(); document.getElementById('status').textContent=''; }

document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    move(e.key.replace('Arrow','').toLowerCase());
  }
});
document.getElementById('new').onclick = init;
init();
</script>
</body>
</html>
