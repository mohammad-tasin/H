<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>2048 Lite</title><link rel="stylesheet" href="../styles.css"></head>
<body><div class="panel"><div class="nav"><a href="../index.html">Home</a><a href="../help/2048-lite-help.html">Help</a></div><h1>2048 Lite</h1><p class="note">Use arrow keys.</p><div id="b" style="display:grid;grid-template-columns:repeat(4,70px);gap:6px"></div><p><button id="new">New Game</button></p><p id="status" class="note"></p></div>
<script>
let g;
function blank(){return Array.from({length:4},()=>Array(4).fill(0));}
function add(){const a=[]; for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!g[r][c])a.push([r,c]); if(!a.length)return; const [r,c]=a[Math.floor(Math.random()*a.length)]; g[r][c]=Math.random()<0.9?2:4;}
function slide(row){row=row.filter(Boolean); for(let i=0;i<row.length-1;i++) if(row[i]===row[i+1]){row[i]*=2;row[i+1]=0;} return row.filter(Boolean).concat(Array(4-row.filter(Boolean).length).fill(0));}
function move(dir){const before=JSON.stringify(g); if(dir==='left'){g=g.map(slide);} if(dir==='right'){g=g.map(r=>slide([...r].reverse()).reverse());} if(dir==='up'){let n=blank(); for(let c=0;c<4;c++){const col=slide([g[0][c],g[1][c],g[2][c],g[3][c]]); for(let r=0;r<4;r++) n[r][c]=col[r];} g=n;} if(dir==='down'){let n=blank(); for(let c=0;c<4;c++){const col=slide([g[3][c],g[2][c],g[1][c],g[0][c]]).reverse(); for(let r=0;r<4;r++) n[r][c]=col[r];} g=n;} if(JSON.stringify(g)!==before) add(); draw(); }
function draw(){const b=document.getElementById('b'); b.innerHTML=''; let max=0; for(let r=0;r<4;r++)for(let c=0;c<4;c++){const v=g[r][c]; max=Math.max(max,v); const d=document.createElement('div'); d.style.height='70px'; d.style.display='grid'; d.style.placeItems='center'; d.style.background=v?'#93c5fd':'#e2e8f0'; d.style.borderRadius='8px'; d.style.fontWeight='700'; d.textContent=v||''; b.appendChild(d);} document.getElementById('status').textContent=max>=2048?'You reached 2048!':''; }
function init(){g=blank(); add(); add(); draw();}
document.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) move(e.key.replace('Arrow','').toLowerCase());}); document.getElementById('new').onclick=init; init();
</script></body></html>
