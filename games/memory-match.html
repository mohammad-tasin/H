<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
<div class="panel">
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="../help/memory-match-help.html">? Help</a>
  </div>
  <h1>🃏 Memory Match</h1>
  <p>Flip two cards at a time — match all emoji pairs to win!</p>

  <div id="grid" class="mem-grid"></div>

  <div style="display:flex;gap:.75rem;align-items:center;margin-top:1rem;flex-wrap:wrap">
    <button id="restart">↺ Restart</button>
  </div>

  <div class="score-bar" style="margin-top:1rem">
    <div class="score-item">
      <span>Pairs</span>
      <span id="pairs">0 / 6</span>
    </div>
    <div class="score-item">
      <span>Moves</span>
      <span id="moves">0</span>
    </div>
  </div>

  <p id="msg" class="note"></p>
</div>

<script>
const em = ['🍎','🍌','🍓','🍒','🍍','🥝'];
let cards = [], open = [], lock = false, done = 0, moves = 0;

function setup() {
  cards = [...em,...em].sort(() => Math.random()-0.5).map((v,i) => ({v, show:false, ok:false, i}));
  open = []; lock = false; done = 0; moves = 0;
  document.getElementById('pairs').textContent = '0 / 6';
  document.getElementById('moves').textContent = 0;
  document.getElementById('msg').textContent = '';
  render();
}

function tap(i) {
  if (lock) return;
  const c = cards[i];
  if (c.show || c.ok) return;
  c.show = true;
  open.push(i);
  render();
  if (open.length === 2) {
    lock = true;
    moves++;
    document.getElementById('moves').textContent = moves;
    const [a, b] = open;
    if (cards[a].v === cards[b].v) {
      cards[a].ok = cards[b].ok = true;
      done += 2;
      open = [];
      lock = false;
      document.getElementById('pairs').textContent = (done/2) + ' / 6';
      if (done === cards.length) {
        document.getElementById('msg').textContent = '🎉 You matched all pairs in ' + moves + ' moves!';
        document.getElementById('msg').className = 'note win';
      }
    } else {
      setTimeout(() => { cards[a].show = false; cards[b].show = false; open = []; lock = false; render(); }, 750);
    }
  }
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  cards.forEach((c, i) => {
    const bt = document.createElement('button');
    bt.textContent = (c.show || c.ok) ? c.v : '?';
    if (c.ok) bt.classList.add('matched');
    bt.onclick = () => tap(i);
    g.appendChild(bt);
  });
}

document.getElementById('restart').onclick = setup;
setup();
</script>
</body>
</html>
